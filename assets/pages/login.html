<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apiscale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/cadastro.css" />
  <link rel="icon" type="image/x-icon" href="../images/logocortada.png">
</head>

<body>
  <main class="auth-page">
    <section class="auth-shell auth-shell-login" aria-labelledby="login-title">
      <article class="auth-card">
        <a class="brand" href="../../index.html" aria-label="Voltar ao início da APISCALE">
          <img src="../images/logocortada.png" alt="Logo Apiscale"
            style="width: 100px !important; height: auto !important;">
          <span class="brand-text">APISCALE</span>
        </a>

        <div class="auth-heading">
          <span class="eyebrow">Portal seguro APISCALE</span>
          <h1 id="login-title">Bem-vindo de volta</h1>
          <p>Acesse sua central com segurança.</p>
        </div>

        <form class="auth-form" action="#" method="post">
          <div class="field">
            <label for="login-email">E-mail</label>
            <input type="email" id="login-email" name="email" placeholder="seuemail@empresa.com" required />
          </div>

          <div class="field">
            <label for="login-password">Senha</label>
            <input type="password" id="login-password" name="senha" placeholder="Digite sua senha" required />
          </div>

          <div class="form-links form-links-top">
            <a href="#">Esqueci minha senha</a>
          </div>

          <div class="button-stack">
            <a class="btn btn-primary" href="verificacao.html">Entrar</a>
            <a class="btn btn-secondary" href="../../index.html">Voltar ao início</a>
          </div>
        </form>

        <p class="auth-footer">
          Ainda não criou sua conta?
          <a href="cadastro.html">Criar conta</a>
        </p>
      </article>
    </section>
  </main>
</body>

</html>

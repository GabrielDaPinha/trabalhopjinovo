<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro | Apiscale</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"rel="stylesheet"/>
    <link rel="stylesheet" href="../css/cadastro.css" />
    <link rel="icon" type="image/x-icon" href="../images/logocortada.png">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-shell signup-shell" aria-labelledby="signup-title">
        <article class="auth-card signup-card">
          <a
            class="brand"
            href="../../index.html"
            aria-label="Voltar ao início da APISCALE"
          >
            <img src="../images/logocortada.png" alt="Logo Apiscale" style="width: 100px !important; height: auto !important;">
                <span class="brand-text">APISCALE</span>
          </a>

          <div class="auth-heading">
            <span class="eyebrow">Comece sua jornada</span>
            <h1 id="signup-title">Crie sua conta</h1>
            <p>
              Escolha seu perfil e prepare sua operação para escalar com
              tecnologia, estratégia e segurança.
            </p>
          </div>

          <form class="auth-form signup-form" action="#" method="post">
            <div class="account-toggle" aria-label="Tipo de conta">
              <input
                type="radio"
                id="person-fisica"
                name="tipo-conta"
                checked
              />
              <input type="radio" id="person-juridica" name="tipo-conta" />

              <div class="toggle-control">
                <label for="person-fisica">Pessoa Física</label>
                <label for="person-juridica">Pessoa Jurídica</label>
                <span class="toggle-indicator" aria-hidden="true"></span>
              </div>

              <div class="signup-panels">
                <div class="fields-panel physical-panel">
                  <div class="field">
                    <label for="nome-completo">Nome completo</label>
                    <input
                      type="text"
                      id="nome-completo"
                      name="nome-completo"
                      placeholder="Seu nome completo"
                    />
                  </div>

                  <div class="field">
                    <label for="cpf">CPF</label>
                    <input
                      type="text"
                      id="cpf"
                      name="cpf"
                      placeholder="000.000.000-00"
                    />
                  </div>

                  <div class="field">
                    <label for="email-pf">E-mail</label>
                    <input
                      type="email"
                      id="email-pf"
                      name="email-pf"
                      placeholder="voce@email.com"
                    />
                  </div>

                  <div class="field">
                    <label for="telefone-pf">Telefone</label>
                    <input
                      type="tel"
                      id="telefone-pf"
                      name="telefone-pf"
                      placeholder="(00) 00000-0000"
                    />
                  </div>

                  <div class="field">
                    <label for="senha-pf">Senha</label>
                    <input
                      type="password"
                      id="senha-pf"
                      name="senha-pf"
                      placeholder="Crie uma senha"
                    />
                  </div>

                  <div class="field">
                    <label for="confirmar-senha-pf">Confirmar senha</label>
                    <input
                      type="password"
                      id="confirmar-senha-pf"
                      name="confirmar-senha-pf"
                      placeholder="Repita sua senha"
                    />
                  </div>
                </div>

                <div class="fields-panel company-panel">
                  <div class="field">
                    <label for="razao-social">Razão social</label>
                    <input
                      type="text"
                      id="razao-social"
                      name="razao-social"
                      placeholder="Nome legal da empresa"
                    />
                  </div>

                  <div class="field">
                    <label for="nome-fantasia">Nome fantasia</label>
                    <input
                      type="text"
                      id="nome-fantasia"
                      name="nome-fantasia"
                      placeholder="Marca ou nome comercial"
                    />
                  </div>

                  <div class="field">
                    <label for="cnpj">CNPJ</label>
                    <input
                      type="text"
                      id="cnpj"
                      name="cnpj"
                      placeholder="00.000.000/0000-00"
                    />
                  </div>

                  <div class="field">
                    <label for="email-pj">E-mail corporativo</label>
                    <input
                      type="email"
                      id="email-pj"
                      name="email-pj"
                      placeholder="contato@empresa.com"
                    />
                  </div>

                  <div class="field">
                    <label for="telefone-pj">Telefone empresarial</label>
                    <input
                      type="tel"
                      id="telefone-pj"
                      name="telefone-pj"
                      placeholder="(00) 0000-0000"
                    />
                  </div>

                  <div class="field">
                    <label for="responsavel">Nome do responsável</label>
                    <input
                      type="text"
                      id="responsavel"
                      name="responsavel"
                      placeholder="Nome do responsável"
                    />
                  </div>

                  <div class="field">
                    <label for="cargo-responsavel">Cargo do responsável</label>
                    <input
                      type="text"
                      id="cargo-responsavel"
                      name="cargo-responsavel"
                      placeholder="Ex: CTO, CEO, Gerente"
                    />
                  </div>

                  <div class="field">
                    <label for="senha-pj">Senha</label>
                    <input
                      type="password"
                      id="senha-pj"
                      name="senha-pj"
                      placeholder="Crie uma senha"
                    />
                  </div>

                  <div class="field">
                    <label for="confirmar-senha-pj">Confirmar senha</label>
                    <input
                      type="password"
                      id="confirmar-senha-pj"
                      name="confirmar-senha-pj"
                      placeholder="Repita sua senha"
                    />
                  </div>
                </div>
              </div>
            </div>

            <label class="terms">
              <input type="checkbox" name="termos" required />
              <span>Aceito os termos de uso</span>
            </label>

            <button class="btn btn-primary" type="submit">Criar conta</button>
            <!-- Redirecionar para página de planos futuramente -->
          </form>

          <p class="auth-footer">
            Já possui acesso? <a href="login.html">Entrar na conta</a>
          </p>
        </article>
      </section>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apiscale</title>


    <link rel="icon" type="image/x-icon" href="../images/logocortada.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/suporte.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-dark sticky-top navazulbg" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center gap-2" href="/index.html">
                    <img src="../images/logocortada.png" alt="Logo Apiscale" width="50" height="50">
                    <span class="brand-text">APISCALE</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto gap-lg-3">
                        <li class="nav-item"><a class="nav-link text-white" href="/index.html">Início</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="/index.html#sobre">Sobre</a></li>
                        <li class="nav-item"><a class="nav-link text-white"
                                href="/index.html#ferramentas">Ferramentas</a></li>
                        <li class="nav-item"><a class="nav-link text-white" href="/index.html#jornadas">Jornadas</a>
                        </li>
                        <li class="nav-item"><a class="nav-link text-white" href="Suporte.html">Suporte</a></li>
                    </ul>
                    <a href="cadastro.html"><button type="button" class="btn btn-light fw-bold">Começar
                            Agora</button></a>
                </div>
            </div>
        </nav>
    </header>

    <main>

        <main class="container my-5 pt-5">
            <div class="row justify-content-center">
                <div class="col-lg-9 col-md-11">
                    <h3 class="mb-4 fw-semibold text-white">Mensagem Para o Suporte</h3>

                    <form class="row g-3">
                        <div class="col-md-7">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="nome" placeholder="Nome" required>
                                <label for="nome">Nome Completo</label>
                            </div>
                        </div>

                        <div class="col-md-5">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="empresa" placeholder="Empresa">
                                <label for="empresa">Empresa (Opcional)</label>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" placeholder="E-mail" required>
                                <label for="email">E-mail de Contato</label>
                            </div>
                        </div>

                        <div class="col-md-12 py-2">
                            <label class="form-label text-white small d-block">Prioridade do Atendimento:</label>
                            <div class="form-check form-check-inline">
                                <input type="radio" name="prio" id="p1" class="form-check-input" checked>
                                <label for="p1" class="form-check-label text-white-50">Normal</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="radio" name="prio" id="p2" class="form-check-input">
                                <label for="p2" class="form-check-label text-white-50">Urgente</label>
                            </div>
                            <div class="col-12">
                                <div class="form-floating">
                                    <textarea class="form-control" id="mensagem" placeholder="Sua mensagem"
                                        style="height: 150px" required></textarea>
                                    <label for="mensagem">Sua Mensagem</label>
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-check">
                                <input type="checkbox" id="termos" class="form-check-input" required>
                                <label for="termos" class="form-check-label text-white small">Aceito os termos de
                                    processamento de dados.</label>
                            </div>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary-custom">Enviar Solicitação</button>
                            <button type="reset" class="btn btn-outline-custom ms-2">Limpar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <footer>
            <section class="stats-custom">
                <div class="container">
                    <div class="d-flex row text-center g-4">
                        <div class="col-6 col-md-3">
                            <div class="h-100 p-3 d-flex flex-column align-items-center">
                                <i class="fa-brands fa-instagram neon-vazado fa-5x"></i>
                                <h4 class="fw-bold mt-3">@_apiscale_</h4>
                                <p class="text-secondary mt-auto">Nosso Instagram</p>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="h-100 p-3 d-flex flex-column align-items-center">
                                <i class="fa-solid fa-at neon-vazado fa-5x"></i>
                                <h4 class="fw-bold mt-3">E-Mail</h4>
                                <p class="text-secondary">apiscalecontato@gmail.com</p>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="h-100 p-3 d-flex flex-column align-items-center">
                                <i class="fa-solid fa-phone neon-vazado fa-5x"></i>
                                <h4 class="fw-bold mt-3">(19) 99658-4146</h4>
                                <p class="text-secondary">Telefone para Contato</p>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="d-flex align-items-center justify-content-center mx-auto" style="width: 35%;">
                                <img src="../images/logocortada.png" alt="Mascote" class="img-fluid p-1">
                            </div>
                            <h4 class="fw-bold mt-3">APISCALE</h4>
                            <p class="text-secondary">Nós</p>
                        </div>
                    </div>
                </div>
            </section>
        </footer>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
